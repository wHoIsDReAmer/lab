apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lobby
spec:
  selector:
    matchLabels:
      app: lobby
  serviceName: "lobby"
  replicas: 1
  template:
    metadata:
      labels:
        app: lobby
    spec:
      enableServiceLinks: false
      terminationGracePeriodSeconds: 60
      initContainers:
      - name: install-ktulu
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          KTULU_VERSION="v0.1.1"
          KTULU_URL="https://github.com/wHoIsDReAmer/Ktulu/releases/download/${KTULU_VERSION}/Ktulu.jar"
          mkdir -p /data/plugins /data/plugins/Ktulu
          if [ ! -f /data/plugins/Ktulu/.version ] || [ "$(cat /data/plugins/Ktulu/.version)" != "${KTULU_VERSION}" ]; then
            wget -O /data/plugins/Ktulu.jar \
              "${KTULU_URL}"
            printf '%s\n' "${KTULU_VERSION}" > /data/plugins/Ktulu/.version
          fi
          if [ ! -f /data/plugins/Ktulu/config.yml ]; then
            printf '%s\n' \
              '# Ktulu Configuration' \
              '' \
              '# API key for web dashboard authentication.' \
              '# Leave empty to disable authentication (not recommended for production).' \
              'api-key: ""' \
              '' \
              '# Web server port' \
              'port: 8332' \
              '' \
              '# Enable if behind a reverse proxy (nginx, Cloudflare, etc.)' \
              '# When enabled, uses X-Forwarded-For / X-Real-IP headers for client IP.' \
              'reverse-proxy: true' \
              > /data/plugins/Ktulu/config.yml
          fi
          chown -R 1000:1000 /data/plugins/Ktulu /data/plugins/Ktulu.jar
        volumeMounts:
        - mountPath: /data
          name: data
      - name: configure-velocity
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          CONF="/data/config/paper-global.yml"
          if [ -f "$CONF" ]; then
            sed -i 's/enabled: false/enabled: true/' "$CONF"
            sed -i "s|secret: .*|secret: ${CFG_VELOCITY_SECRET}|" "$CONF"
            echo "[init] Velocity forwarding configured"
          else
            echo "[init] paper-global.yml not found yet, will be configured on next restart"
          fi
        env:
        - name: CFG_VELOCITY_SECRET
          valueFrom:
            secretKeyRef:
              name: velocity-forwarding-secret
              key: forwarding.secret
        volumeMounts:
        - mountPath: /data
          name: data
      containers:
      - name: lobby
        image: itzg/minecraft-server:latest
        tty: true
        stdin: true
        ports:
        - containerPort: 25565
          name: minecraft
        - containerPort: 8332
          name: ktulu
        env:
        - name: EULA
          value: "TRUE"
        - name: TYPE
          value: "PAPER"
        - name: VERSION
          value: "1.21.4"
        - name: MEMORY
          value: "2G"
        - name: ONLINE_MODE
          value: "FALSE"
        - name: SERVER_PORT
          value: "25565"
        - name: MOTD
          value: "Lobby Server"
        - name: DIFFICULTY
          value: "peaceful"
        - name: SPAWN_PROTECTION
          value: "0"
        - name: MAX_PLAYERS
          value: "100"
        - name: VIEW_DISTANCE
          value: "10"
        - name: ENABLE_COMMAND_BLOCK
          value: "TRUE"
        - name: FORCE_GAMEMODE
          value: "TRUE"
        - name: GAMEMODE
          value: "adventure"
        - name: PVP
          value: "FALSE"
        - name: CFG_VELOCITY_SECRET
          valueFrom:
            secretKeyRef:
              name: velocity-forwarding-secret
              key: forwarding.secret
        - name: REPLACE_ENV_VARIABLES
          value: "TRUE"
        - name: ENV_VARIABLE_PREFIX
          value: "CFG_"
        - name: LEVEL_TYPE
          value: "flat"
        - name: GENERATOR_SETTINGS
          value: '{"layers":[{"block":"stone","height":1},{"block":"grass_block","height":1}],"biome":"plains"}'
        volumeMounts:
        - mountPath: /data
          name: data
        readinessProbe:
          exec:
            command:
            - mc-health
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - mc-health
          initialDelaySeconds: 60
          periodSeconds: 15
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      storageClassName: local-path
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
