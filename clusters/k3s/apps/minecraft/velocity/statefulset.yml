apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: velocity
spec:
  selector:
    matchLabels:
      app: velocity
  serviceName: "velocity"
  replicas: 1
  template:
    metadata:
      labels:
        app: velocity
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
      - name: copy-secret
        image: busybox:1.36
        command: ["sh", "-c", "cp /secret/forwarding.secret /shared/forwarding.secret"]
        volumeMounts:
        - mountPath: /secret
          name: forwarding-secret
          readOnly: true
        - mountPath: /shared
          name: shared
      containers:
      - name: velocity
        image: itzg/bungeecord:latest
        env:
        - name: TYPE
          value: "VELOCITY"
        - name: VELOCITY_VERSION
          value: "3.4.0-SNAPSHOT"
        - name: VELOCITY_BUILD_ID
          value: "latest"
        - name: MEMORY
          value: "512M"
        ports:
        - containerPort: 25577
          name: proxy
        volumeMounts:
        - mountPath: /server
          name: data
        - mountPath: /config
          name: velocity-config
          readOnly: true
        - mountPath: /server/forwarding.secret
          name: shared
          subPath: forwarding.secret
        readinessProbe:
          tcpSocket:
            port: 25577
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 25577
          initialDelaySeconds: 30
          periodSeconds: 15
      volumes:
      - name: velocity-config
        configMap:
          name: velocity-config
      - name: forwarding-secret
        secret:
          secretName: velocity-forwarding-secret
      - name: shared
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      storageClassName: local-path
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
