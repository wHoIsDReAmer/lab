apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: shared-wildcard-devcw-xyz
  namespace: kube-system
spec:
  secretName: shared-wildcard-devcw-xyz-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - devcw.xyz
  - "*.devcw.xyz"
---
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: kube-system
spec:
  defaultCertificate:
    secretName: shared-wildcard-devcw-xyz-tls
